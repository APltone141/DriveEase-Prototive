<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layanan — DriveEase</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/themes.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <style>
    .page-main { padding-top: 88px; min-height: 60vh; }
    .layanan-header { padding: var(--sp-8) 0 var(--sp-4); }
    .layanan-header h1 { font-family: var(--font-display); font-size: var(--text-3xl); margin-bottom: var(--sp-2); }
    .search-context { font-size: var(--text-sm); color: var(--color-text-muted); }
    .search-context strong { color: var(--color-text); }
    .filter-bar {
      position: sticky; top: 72px; z-index: var(--z-sticky);
      background: var(--color-bg); border-bottom: 1px solid var(--color-border);
      padding: var(--sp-4) 0; margin-bottom: var(--sp-6);
      box-shadow: var(--shadow-sm);
    }
    .filter-grid {
      display: grid; gap: var(--sp-4);
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      align-items: end;
    }
    .filter-field label { display: block; font-size: var(--text-xs); font-weight: 700; color: var(--color-text-muted); margin-bottom: var(--sp-1); text-transform: uppercase; letter-spacing: 0.04em; }
    .filter-field-wide { grid-column: span 2; }
    @media (max-width: 768px) { .filter-field-wide { grid-column: span 1; } }
    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--sp-6); transition: opacity 200ms ease;
    }
    .product-grid.is-updating { opacity: 0.35; pointer-events: none; }
    .layanan-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--sp-4); margin-bottom: var(--sp-6); }
    .result-count { font-size: var(--text-sm); color: var(--color-text-muted); }
    .page-footer-lite { border-top: 1px solid var(--color-border); padding: var(--sp-8) 0; margin-top: var(--sp-16); text-align: center; font-size: var(--text-sm); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <script>
    (function () {
      const theme  = localStorage.getItem('driveease_theme')  || 'light';
      const accent = localStorage.getItem('driveease_accentColor') || 'blue';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-accent', accent);
      const ACCENT = {
        blue:   { p:'#1A6BF5', d:'#1250C2', l:'#4D8EFF', s:'#EBF1FF' },
        red:    { p:'#EF4444', d:'#DC2626', l:'#F87171', s:'#FEF2F2' },
        orange: { p:'#F97316', d:'#EA580C', l:'#FB923C', s:'#FFF7ED' },
      };
      const c = ACCENT[accent] || ACCENT.blue;
      const r = document.documentElement;
      r.style.setProperty('--color-primary', c.p);
      r.style.setProperty('--color-primary-dark', c.d);
      r.style.setProperty('--color-primary-light', c.l);
      r.style.setProperty('--color-primary-subtle', c.s);
    })();
  </script>

  <nav class="navbar" id="navbar" role="navigation" aria-label="Navigasi Utama">
    <div class="container">
      <a href="index.html" class="navbar__brand" aria-label="DriveEase Beranda">
        <i class="fa-solid fa-car-side" aria-hidden="true"></i>
        Drive<span>Ease</span>
      </a>
      <ul class="navbar__links" role="list">
        <li><a href="index.html" class="nav-link">Beranda</a></li>
        <li><a href="layanan.html" class="nav-link">Layanan</a></li>
        <li><a href="tracking.html" class="nav-link">Tracking</a></li>
      </ul>
      <div class="navbar__actions">
        <button class="btn-icon" data-navbar-theme aria-label="Ganti tema" title="Mode Gelap" style="width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);background:transparent;transition:background var(--transition-fast),color var(--transition-fast);">
          <i class="fa-solid fa-moon" aria-hidden="true"></i>
        </button>
        <div id="navAuthArea" class="flex items-center gap-3">
          <div id="navGuest" class="flex items-center gap-2">
            <a href="login.html" class="btn btn-ghost btn-sm">Masuk</a>
            <a href="login.html#register" class="btn btn-primary btn-sm">Daftar</a>
          </div>
          <div id="navUser" class="hidden flex items-center gap-3">
            <a href="tracking.html" class="btn-icon" id="navBookingBadge" aria-label="Pesanan aktif" style="position:relative;display:none;">
              <i class="fa-solid fa-bell" style="font-size:1.1rem;color:var(--color-text-muted);"></i>
              <span id="navBadgeCount" style="position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;background:var(--color-danger);color:#fff;border-radius:var(--radius-pill);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;">0</span>
            </a>
            <div class="dropdown" id="navAvatarDropdown">
              <button class="flex items-center gap-2" style="background:none;border:none;cursor:pointer;padding:0;" aria-haspopup="true" aria-expanded="false" id="navAvatarBtn">
                <img id="navAvatar" src="https://i.pravatar.cc/150?img=3" alt="Avatar" class="nav-avatar" width="36" height="36" />
                <span id="navUserName" class="font-semibold text-sm hide-mobile" style="color:var(--color-text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Pengguna</span>
                <i class="fa-solid fa-chevron-down hide-mobile" style="font-size:11px;color:var(--color-text-muted);"></i>
              </button>
              <div class="dropdown-menu" id="navDropdownMenu" role="menu">
                <a href="profil.html" class="dropdown-item" role="menuitem"><i class="fa-solid fa-user" aria-hidden="true"></i> Profil Saya</a>
                <a href="tracking.html" class="dropdown-item" role="menuitem"><i class="fa-solid fa-location-dot" aria-hidden="true"></i> Tracking Pesanan</a>
                <a href="profil.html#riwayat" class="dropdown-item" role="menuitem"><i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i> Riwayat</a>
                <a href="profil.html#pengaturan" class="dropdown-item" role="menuitem"><i class="fa-solid fa-gear" aria-hidden="true"></i> Pengaturan</a>
                <div class="dropdown-divider" role="separator"></div>
                <button class="dropdown-item danger" id="navLogoutBtn" role="menuitem" style="width:100%;text-align:left;">
                  <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> Keluar
                </button>
              </div>
            </div>
          </div>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Buka menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="nav-drawer-overlay" id="navOverlay" aria-hidden="true"></div>
  <aside class="nav-drawer" id="navDrawer" aria-label="Menu mobile" hidden>
    <a href="index.html" class="navbar__brand" style="margin-bottom:var(--sp-4);">
      <i class="fa-solid fa-car-side" aria-hidden="true"></i> Drive<span>Ease</span>
    </a>
    <div id="drawerUserStrip" class="hidden flex items-center gap-3" style="padding:var(--sp-3) var(--sp-4);background:var(--color-surface);border-radius:var(--radius-md);margin-bottom:var(--sp-4);">
      <img id="drawerAvatar" src="https://i.pravatar.cc/150?img=3" alt="Avatar" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" />
      <div>
        <div id="drawerName" class="font-semibold text-sm" style="color:var(--color-text);">Pengguna</div>
        <div id="drawerEmail" class="text-sm" style="color:var(--color-text-muted);font-size:0.75rem;"></div>
      </div>
    </div>
    <nav>
      <ul style="display:flex;flex-direction:column;gap:var(--sp-1);" role="list">
        <li><a href="index.html" class="nav-link" style="display:block;padding:var(--sp-3) var(--sp-4);"><i class="fa-solid fa-house" style="width:20px;"></i> Beranda</a></li>
        <li><a href="layanan.html" class="nav-link" style="display:block;padding:var(--sp-3) var(--sp-4);"><i class="fa-solid fa-car" style="width:20px;"></i> Layanan</a></li>
        <li><a href="tracking.html" class="nav-link" style="display:block;padding:var(--sp-3) var(--sp-4);"><i class="fa-solid fa-location-dot" style="width:20px;"></i> Tracking</a></li>
        <li><a href="profil.html" class="nav-link" style="display:block;padding:var(--sp-3) var(--sp-4);"><i class="fa-solid fa-user" style="width:20px;"></i> Profil</a></li>
      </ul>
    </nav>
    <hr class="divider" />
    <label class="toggle-switch" style="padding:var(--sp-2) var(--sp-4);">
      <input type="checkbox" data-theme-toggle aria-label="Mode gelap" />
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label">Mode Gelap</span>
    </label>
    <hr class="divider" />
    <div id="drawerGuestActions" class="flex-col gap-2">
      <a href="login.html" class="btn btn-primary" style="width:100%;justify-content:center;">Masuk</a>
      <a href="login.html#register" class="btn btn-ghost" style="width:100%;justify-content:center;">Daftar</a>
    </div>
    <button id="drawerLogoutBtn" class="hidden btn btn-danger btn-sm" style="width:100%;margin-top:auto;">
      <i class="fa-solid fa-right-from-bracket"></i> Keluar
    </button>
  </aside>

  <main class="page-main">
    <div class="container layanan-header">
      <h1>Paket &amp; Layanan</h1>
      <p id="searchContextLine" class="search-context hidden"></p>
    </div>

    <div class="filter-bar">
      <div class="container">
        <div class="filter-grid">
          <div class="filter-field">
            <label for="fType">Jenis</label>
            <select id="fType" class="input-field">
              <option>Semua</option>
              <option>SUV</option>
              <option>MPV</option>
              <option>Sedan</option>
              <option>City Car</option>
              <option>Luxury MPV</option>
              <option>Minibus</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="fBrand">Brand</label>
            <select id="fBrand" class="input-field">
              <option>Semua</option>
              <option>Toyota</option>
              <option>Honda</option>
              <option>Mitsubishi</option>
              <option>Suzuki</option>
              <option>Daihatsu</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="fSeats">Kapasitas</label>
            <select id="fSeats" class="input-field">
              <option>Semua</option>
              <option>4</option>
              <option>6</option>
              <option>7</option>
              <option>8+</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="fDriver">Driver</label>
            <select id="fDriver" class="input-field">
              <option>Semua</option>
              <option>Lepas Kunci</option>
              <option>Dengan Sopir</option>
            </select>
          </div>
          <div class="filter-field filter-field-wide">
            <label>Harga per hari</label>
            <div class="range-custom" id="priceRangeWrap" style="margin-top:8px;">
              <div class="range-fill" id="priceRangeFill"></div>
              <input type="range" id="priceMin" min="150000" max="1450000" step="50000" value="150000" />
              <input type="range" id="priceMax" min="200000" max="1500000" step="50000" value="1500000" />
            </div>
            <div class="range-value" id="priceRangeLabel">Rp 150.000 — Rp 1.500.000</div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="layanan-toolbar">
        <span class="result-count" id="resultCount">Memuat…</span>
        <div class="filter-field" style="margin:0;min-width:200px;">
          <label for="fSort" class="sr-only">Urutkan</label>
          <select id="fSort" class="input-field">
            <option>Populer</option>
            <option>Harga ↑</option>
            <option>Harga ↓</option>
            <option>Rating</option>
          </select>
        </div>
      </div>
      <div id="productGrid" class="product-grid" aria-live="polite"></div>
      <div class="text-center" style="margin-top:var(--sp-8);">
        <button type="button" class="btn btn-secondary hidden" id="loadMoreBtn">Muat lebih banyak</button>
      </div>
    </div>

    <footer class="page-footer-lite">
      <div class="container">© 2026 DriveEase · <a href="index.html" class="text-primary">Beranda</a></div>
    </footer>
  </main>

  <script type="module" src="assets/js/pages/layanan.js"></script>
</body>
</html>
